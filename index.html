<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>usdtcoins</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
user-select:none;
}
body{
background:#08110f;
overflow:hidden;
height:100vh;
display: flex;
justify-content: center;
align-items: center;
}
.app{
width: 100%;
max-width:450px;
height:100vh;
background:linear-gradient(to bottom,#0c2018,#050907);
display:flex;
flex-direction:column;
justify-content:space-between;
padding:20px 15px;
color:white;
position: relative;
}
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
gap: 10px;
}
.rank{
background:rgba(255,255,255,.06);
padding:8px 14px;
border-radius:12px;
font-size:14px;
white-space: nowrap;
}
.wallet-status{
background:rgba(0,255,200,.08);
padding:8px 14px;
border-radius:12px;
color:#ff4a4a;
font-size:13px;
white-space: nowrap;
}
.balance{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
font-size:46px;
font-weight:bold;
margin-top:15px;
}
.balance img{
width:45px;
height:45px;
}
.center{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}
.coin-container {
width: 240px;
height: 240px;
border-radius: 50%;
background: #26a17b;
padding: 8px;
box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 20px rgba(38, 161, 123, 0.3);
cursor: pointer;
transition: transform 0.05s;
display: flex;
justify-content: center;
align-items: center;
}
.coin-container:active {
transform: scale(0.93);
}
.coin-inner {
width: 100%;
height: 100%;
border-radius: 50%;
background: #0b4733;
overflow: hidden;
display: flex;
justify-content: center;
align-items: center;
border: 4px solid #08110f;
}
.coin-inner img {
width: 100%;
height: 100%;
object-fit: cover;
pointer-events: none;
}
.tap{
position:absolute;
font-size:35px;
font-weight:bold;
color:#00ffd0;
animation:up .5s ease-out forwards;
pointer-events:none;
z-index:99;
text-shadow: 0 2px 10px rgba(0,255,208,0.5);
}
@keyframes up{
0%{ opacity:1; transform:translateY(0) scale(1); }
100%{ opacity:0; transform:translateY(-120px) scale(0.8); }
}
.bottom-info {
display: flex;
flex-direction: column;
gap: 10px;
margin-bottom: 15px;
}
.bottom-row{
display:flex;
justify-content:space-between;
align-items:center;
}
.energy{
font-size:16px;
font-weight:bold;
display: flex;
align-items: center;
gap: 5px;
}
.boost{
background:linear-gradient(90deg, #ff9f43, #ff5252);
padding:8px 18px;
border-radius:12px;
color:white;
font-weight:bold;
cursor: pointer;
box-shadow: 0 4px 10px rgba(255,82,82,0.3);
font-size: 14px;
}
.progress-container {
width: 100%;
height: 12px;
background: rgba(255,255,255,0.1);
border-radius: 10px;
overflow: hidden;
border: 1px solid rgba(255,255,255,0.05);
}
.progress-bar {
width: 100%;
height: 100%;
background: linear-gradient(90deg, #26a17b, #00ffd0);
border-radius: 10px;
transition: width 0.1s ease;
}
.nav{
background:#0b1714;
padding:15px;
border-radius:18px;
display:flex;
justify-content:space-around;
align-items: center;
border: 1px solid rgba(255,255,255,0.05);
margin-bottom: 5px;
}
.nav-item{
display:flex;
flex-direction:column;
align-items:center;
font-size:14px;
color:#587067;
gap:5px;
flex: 1;
text-align: center;
cursor: pointer;
}
.nav-item.active{
color:#00ffd0;
}
#ton-connect-btn div button {
background: #00ffd0 !important;
color: black !important;
font-weight: bold !important;
border-radius: 12px !important;
padding: 10px 14px !important;
font-size: 13px !important;
}
</style>
</head>
<body>
<div class="app" id="appContainer">
<div class="topbar">
<div class="rank">🏆 Bronze</div>
<div id="ton-connect-btn"></div>
<div class="wallet-status" id="walletStatus">غير مربوط</div>
</div>

<div class="balance">
<img src="https://assets.coingecko.com/coins/images/325/large/Tether.png" alt="USDT">
<span id="coins">0</span>
</div>

<div class="center">
<div class="coin-container" id="coin">
<div class="coin-inner">
<img src="https://assets.coingecko.com/coins/images/325/large/Tether.png" alt="USDT Coin">
</div>
</div>
</div>

<div class="bottom-info">
<div class="bottom-row">
<div class="energy">⚡ <span id="energy">500</span>/500</div>
<div class="boost" onclick="rewardBoost()">🚀 BOOST (+50)</div>
</div>
<div class="progress-container">
<div class="progress-bar" id="progressBar"></div>
</div>
</div>

<div class="nav">
  <div class="nav-item active">
    <i class="fa-solid fa-coins" style="font-size:20px;"></i>
    <span>Earn</span>
  </div>
  <div class="nav-item">
    <i class="fa-solid fa-user" style="font-size:20px;"></i>
    <span>Account</span>
  </div>
</div>
</div>

<script>
const SUPABASE_URL = "https://kafpeuavozrnfvwgkddn.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthZnBldWF2b3pybmZ2d2drZGRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NzQ2MjQsImV4cCI6MjA5NTE1MDYyNH0.7pCEBTFFgSCmRBSqpDggifYSAqJ7IvJBQ9EEzx00B2c";
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const TABLE_NAME = "players"; 

const appContainer = document.getElementById("appContainer");
const coin = document.getElementById("coin");
const coinsEl = document.getElementById("coins");
const energyEl = document.getElementById("energy");
const progressBar = document.getElementById("progressBar");

let coins = 0;
let energy = 500;
const maxEnergy = 500;
let savedWalletAddress = null;

let webUserId = localStorage.getItem("usdtcoins_user_id");
if (!webUserId) {
    webUserId = "usr_" + Math.floor(100000 + Math.random() * 900000);
    localStorage.setItem("usdtcoins_user_id", webUserId);
}

async function loadData(){
    try{
        const {data, error} = await supabaseClient.from(TABLE_NAME).select("*").eq("id", webUserId).single();
        if(error && error.code === "PGRST116"){
            await supabaseClient.from(TABLE_NAME).insert([{ id: webUserId, coins: 0, energy: maxEnergy }]);
        } else if(data){
            coins = parseInt(data.coins) || 0;
            energy = parseInt(data.energy) || maxEnergy;
            if(data.wallet_address){
                savedWalletAddress = data.wallet_address;
                document.getElementById("walletStatus").innerText = "مربوط";
                document.getElementById("walletStatus").style.color = "#00ffd0";
            }
        }
        updateUI();
    } catch(err) { console.error(err); }
}

async function saveDataDirectly(currentCoins, currentEnergy, walletAddress = undefined){
    try{
        let updateData = { id: webUserId, coins: currentCoins, energy: currentEnergy };
        if (walletAddress !== undefined) {
            updateData.wallet_address = walletAddress;
            savedWalletAddress = walletAddress;
        } else if (savedWalletAddress) {
            updateData.wallet_address = savedWalletAddress;
        }
        await supabaseClient.from(TABLE_NAME).upsert(updateData);
    } catch(err){ console.error(err); }
}

setInterval(() => { saveDataDirectly(coins, energy); }, 4000);

setInterval(() => {
    if (energy < maxEnergy) {
        energy++;
        updateUI();
    }
}, 1000);

function updateUI(){
    coinsEl.innerText = coins.toLocaleString();
    energyEl.innerText = energy;
    let percentage = (energy / maxEnergy) * 100;
    progressBar.style.width = percentage + "%";
}

function rewardBoost() {
    coins += 50; 
    updateUI();
    saveDataDirectly(coins, energy);
    alert("مبروك! ربحت 50 عملة إضافية من الـ BOOST 🎉");
}

function handleTap(clientX, clientY) {
    if(energy <= 0) return;
    coins++;
    energy--;
    createEffect(clientX, clientY);
    updateUI();
    
    if(coins % 4 === 0) {
        saveDataDirectly(coins, energy);
    }
}

coin.addEventListener("touchstart", (e) => {
    e.preventDefault();
    for(let i = 0; i < e.changedTouches.length; i++){
        handleTap(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
    }
}, {passive: false});

coin.addEventListener("mousedown", (e) => {
    handleTap(e.clientX, e.clientY);
});

function createEffect(x, y){
    const div = document.createElement("div");
    div.className = "tap";
    div.innerText = "+1";
    const rect = appContainer.getBoundingClientRect();
    div.style.left = (x - rect.left - 15) + "px";
    div.style.top = (y - rect.top - 20) + "px";
    appContainer.appendChild(div);
    setTimeout(() => div.remove(), 500);
}

// كود ذكي يتعرف تلقائيًا على مسار ورابط الـ GitHub Pages الحالي دون كتابة أي رابط يدوي
const autoOrigin = window.location.origin + window.location.pathname.replace(/\/$/, "");

const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: autoOrigin + '/tonconnect-manifest.json',
    buttonRootId: 'ton-connect-btn'
});

tonConnectUI.onStatusChange(async (wallet) => {
    const walletStatusEl = document.getElementById("walletStatus");
    if (wallet) {
        walletStatusEl.innerText = "مربوط";
        walletStatusEl.style.color = "#00ffd0";
        await saveDataDirectly(coins, energy, wallet.account.address);
    } else {
        walletStatusEl.innerText = "غير مربوط";
        walletStatusEl.style.color = "#ff4a4a";
    }
});

loadData();
</script>
</body>
</html>
